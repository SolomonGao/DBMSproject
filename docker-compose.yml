version: '3.8'

services:
  # MySQL 数据库服务
  db:
    image: mysql:8.0
    container_name: gdelt_mysql
    command: --local-infile=1
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: gdelt
    ports:
      - "3307:3306"
    volumes:
      # 自动挂载初始化脚本，MySQL 启动时自动建表
      - ./db_scripts/gdelt_db_v1.sql:/docker-entrypoint-initdb.d/init.sql
      # 持久化数据库数据
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  # FastAPI 后端服务
  backend:
    build: .
    container_name: gdelt_backend
    depends_on:
      db:
        condition: service_healthy
    ports:
