services:
  db:
    image: mysql:8.0
    container_name: gdelt_mysql
    command: --local-infile=1
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-gdelt}
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - ./db_scripts/gdelt_db_v1.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-rootpassword}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: gdelt_backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - .:/app
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data:ro
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      DB_NAME: ${DB_NAME:-gdelt}
      THP_CHECKPOINT_PATH: ${THP_CHECKPOINT_PATH:-models/thp_gdelt.pt}
      CHROMA_DB_PATH: ${CHROMA_DB_PATH:-/app/chroma_db}
    command: >
      sh -c "python run_backend.py --host 0.0.0.0 --port 8000"

  frontend:
    image: node:20-slim
    container_name: gdelt_frontend
    working_dir: /app
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}/api/v1
    depends_on:
      - backend

volumes:
  db_data:
  frontend_node_modules:
