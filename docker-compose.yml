    volumes:
      # 代码热重载：本地修改立即生效
      - .:/app
      # 大数据目录运行时挂载（不进入镜像）
      - ./chroma_db:/app/chroma_db:ro
      - ./data:/app/data:ro
      - ./logs:/app/logs
    # 加载环境变量文件
    env_file:
      - .env
    environment:
      # 容器内 MySQL host 是服务名 "db"
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: gdelt
    command: >
      sh -c "python run_backend.py --host 0.0.0.0 --port 8000"
    # 开发模式使用 reload；生产模式去掉 --reload
    # command: >
    #   sh -c "python run_backend.py --host 0.0.0.0 --port 8000 --reload"

  # 前端 React 服务（开发模式）
  frontend:
    image: node:20-slim
    container_name: gdelt_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      # 前端 API 指向后端容器
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  db_data:
  frontend_node_modules: